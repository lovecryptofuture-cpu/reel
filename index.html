<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Reel">
<meta name="theme-color" content="#0E0E10">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Reel</title>
<style>
  :root{
    --bg:#0E0E10; --surface:#17171B; --surface-2:#1F1F25;
    --line:#2A2A31; --text:#F2F0EC; --muted:#8A8A95;
    --accent:#E8B65A; --accent-dim:#7a6334;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex;flex-direction:column;
    height:100dvh;overflow:hidden;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  header{
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 20px 10px;
  }
  .wordmark{font-size:22px;font-weight:700;letter-spacing:-.02em}
  .wordmark span{color:var(--accent)}
  .add{
    width:40px;height:40px;border-radius:50%;border:1px solid var(--line);
    background:var(--surface);color:var(--text);font-size:24px;line-height:1;
    display:flex;align-items:center;justify-content:center;cursor:pointer;
  }
  .add:active{background:var(--surface-2)}
  #file{display:none}

  /* library bar */
  .libs{
    display:flex;gap:8px;padding:4px 16px 10px;overflow-x:auto;
    -webkit-overflow-scrolling:touch;scrollbar-width:none;flex-shrink:0;
  }
  .libs::-webkit-scrollbar{display:none}
  .pill{
    flex-shrink:0;display:flex;align-items:center;gap:6px;
    padding:7px 14px;border-radius:18px;border:1px solid var(--line);
    background:var(--surface);color:var(--muted);font-size:13px;font-weight:500;
    cursor:pointer;white-space:nowrap;
  }
  .pill.on{background:var(--accent);color:#16130a;border-color:var(--accent)}
  .pill svg{display:block}
  .pill .ct{font-size:11px;opacity:.7}
  .pill.new{color:var(--accent);border-style:dashed}

  .list{flex:1;overflow-y:auto;padding:6px 12px 12px;-webkit-overflow-scrolling:touch}
  .empty{
    height:100%;display:flex;flex-direction:column;align-items:center;
    justify-content:center;text-align:center;color:var(--muted);gap:14px;padding:30px;
  }
  .empty svg{opacity:.5}
  .empty b{color:var(--text);font-weight:600}

  .track{
    display:flex;align-items:center;gap:14px;padding:11px 12px;border-radius:12px;cursor:pointer;
  }
  .track:active{background:var(--surface)}
  .track.playing{background:var(--surface)}
  .idx{
    width:30px;text-align:center;font-variant-numeric:tabular-nums;
    color:var(--muted);font-size:13px;flex-shrink:0;
  }
  .track.playing .idx{color:var(--accent)}
  .bars{display:none;gap:2px;align-items:flex-end;height:14px}
  .track.playing .bars{display:flex}
  .track.playing .idx{display:none}
  .bars i{width:3px;background:var(--accent);border-radius:2px;animation:bar .9s ease-in-out infinite}
  .bars i:nth-child(2){animation-delay:.25s}
  .bars i:nth-child(3){animation-delay:.5s}
  @keyframes bar{0%,100%{height:4px}50%{height:14px}}
  .meta{min-width:0;flex:1}
  .meta .t{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:6px}
  .meta .t .heart{color:var(--accent);font-size:11px;flex-shrink:0}
  .meta .s{font-size:12px;color:var(--muted);margin-top:2px}
  .dots{color:var(--muted);font-size:20px;padding:4px 8px;flex-shrink:0;letter-spacing:1px;line-height:1}
  .dots:active{color:var(--text)}

  .player{
    background:var(--surface);border-top:1px solid var(--line);
    padding:14px 20px 16px;
  }
  .now{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .disc{
    width:44px;height:44px;border-radius:50%;flex-shrink:0;
    background:radial-gradient(circle at center,var(--accent) 0 14%,#222 15% 100%);
    border:1px solid var(--line);
  }
  .disc.spin{animation:spin 4s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .now .t{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .now .s{font-size:12px;color:var(--muted)}

  .seek{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .time{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;width:34px;text-align:center}
  input[type=range]{
    -webkit-appearance:none;flex:1;height:4px;border-radius:2px;
    background:var(--line);outline:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;width:15px;height:15px;border-radius:50%;
    background:var(--accent);cursor:pointer;
  }
  .controls{display:flex;align-items:center;justify-content:center;gap:26px}
  .ctl{background:none;border:none;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center}
  .ctl svg{display:block}
  .ctl.sm{color:var(--muted)}
  .ctl.sm.on{color:var(--accent)}
  .play{
    width:60px;height:60px;border-radius:50%;background:var(--accent);color:#16130a;
  }
  .play:active{transform:scale(.96)}

  /* sheet + modal */
  .scrim{
    position:fixed;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;
    transition:opacity .18s ease;z-index:50;
  }
  .scrim.show{opacity:1;pointer-events:auto}
  .sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:51;
    background:var(--surface);border-top:1px solid var(--line);
    border-radius:18px 18px 0 0;padding:8px 12px calc(12px + env(safe-area-inset-bottom));
    transform:translateY(110%);transition:transform .22s cubic-bezier(.3,.7,.3,1);
    max-height:72vh;overflow-y:auto;
  }
  .sheet.show{transform:translateY(0)}
  .grip{width:38px;height:4px;border-radius:2px;background:var(--line);margin:8px auto 12px}
  .sheet h3{font-size:13px;color:var(--muted);font-weight:500;padding:4px 12px 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .opt{
    display:flex;align-items:center;gap:14px;padding:15px 14px;border-radius:12px;
    font-size:16px;cursor:pointer;
  }
  .opt:active{background:var(--surface-2)}
  .opt svg{flex-shrink:0;color:var(--muted)}
  .opt.danger{color:#e07a7a}
  .opt.danger svg{color:#e07a7a}
  .opt .chk{margin-left:auto;color:var(--accent)}
  .field{
    width:100%;background:var(--bg);border:1px solid var(--line);color:var(--text);
    font-size:16px;padding:13px 14px;border-radius:12px;margin:4px 0 12px;outline:none;
  }
  .field:focus{border-color:var(--accent)}
  .row2{display:flex;gap:10px;padding:0 2px 6px}
  .btn{
    flex:1;padding:13px;border-radius:12px;border:none;font-size:15px;font-weight:600;cursor:pointer;
  }
  .btn.ghost{background:var(--surface-2);color:var(--text)}
  .btn.fill{background:var(--accent);color:#16130a}
</style>
</head>
<body>
<header>
  <div class="wordmark">Reel<span>.</span></div>
  <button class="add" id="addBtn" aria-label="Add audio">+</button>
  <input type="file" id="file" accept="audio/*,.mp3,.m4a,.aac,.flac,.wav,.ogg,.opus,.wma" multiple>
</header>

<div class="libs" id="libs"></div>

<div class="list" id="list"></div>

<div class="player">
  <div class="now">
    <div class="disc" id="disc"></div>
    <div style="min-width:0;flex:1">
      <div class="t" id="nowT">Nothing playing</div>
      <div class="s" id="nowS">Add audio to start</div>
    </div>
  </div>
  <div class="seek">
    <span class="time" id="cur">0:00</span>
    <input type="range" id="seek" value="0" min="0" max="1000">
    <span class="time" id="dur">0:00</span>
  </div>
  <div class="controls">
    <button class="ctl sm" id="shuffle" aria-label="Shuffle">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5M4 20 21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
    </button>
    <button class="ctl" id="prev" aria-label="Previous">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
    </button>
    <button class="ctl play" id="play" aria-label="Play">
      <svg id="playIcon" width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <button class="ctl" id="next" aria-label="Next">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zm-2 6L5.5 6v12z"/></svg>
    </button>
    <button class="ctl sm" id="repeat" aria-label="Repeat">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2l4 4-4 4M3 11V9a4 4 0 0 1 4-4h14M7 22l-4-4 4-4M21 13v2a4 4 0 0 1-4 4H3"/></svg>
    </button>
  </div>
</div>

<audio id="audio"></audio>

<!-- sheets -->
<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet"><div class="grip"></div><div id="sheetBody"></div></div>

<script>
const $=id=>document.getElementById(id);
const audio=$('audio');
let tracks=[];           // master library: {id,name,size,blob,fav}
let playlists=[];        // {id,name,trackIds:[]}
let view='all';          // 'all' | 'fav' | playlistId
let queue=[], current=-1;// queue of track objects + index into it
let shuffle=false, repeat=false;
let db;

// ---- IndexedDB ----
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open('reel',2);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('tracks')) d.createObjectStore('tracks',{keyPath:'id'});
      if(!d.objectStoreNames.contains('playlists')) d.createObjectStore('playlists',{keyPath:'id'});
    };
    r.onsuccess=e=>res(e.target.result);
    r.onerror=e=>rej(e);
  });
}
function all(store){return new Promise((res)=>{
  if(!db)return res([]);
  const out=[]; const c=db.transaction(store).objectStore(store).openCursor();
  c.onsuccess=e=>{const cur=e.target.result; if(cur){out.push(cur.value);cur.continue();}else res(out);};
  c.onerror=()=>res([]);
});}
function put(store,rec){return new Promise((res)=>{
  if(!db)return res(); const t=db.transaction(store,'readwrite');
  t.objectStore(store).put(rec); t.oncomplete=()=>res();
});}
function del(store,id){return new Promise((res)=>{
  if(!db)return res(); const t=db.transaction(store,'readwrite');
  t.objectStore(store).delete(id); t.oncomplete=()=>res();
});}

const uid=()=>crypto.randomUUID();
function cleanName(n){return n.replace(/\.[^.]+$/,'').replace(/[_-]+/g,' ').trim();}
function fmt(s){if(!s||isNaN(s))return'0:00';const m=Math.floor(s/60),x=Math.floor(s%60);return m+':'+(x<10?'0':'')+x;}
function trackById(id){return tracks.find(t=>t.id===id);}

// ---- visible list for current view ----
function visible(){
  if(view==='all')return tracks;
  if(view==='fav')return tracks.filter(t=>t.fav);
  const pl=playlists.find(p=>p.id===view);
  if(!pl)return tracks;
  return pl.trackIds.map(trackById).filter(Boolean);
}

// ---- add files ----
async function addFiles(files){
  for(const f of files){
    const rec={id:uid(),name:cleanName(f.name),size:f.size,blob:f,fav:false};
    await put('tracks',rec); tracks.push(rec);
  }
  render();
}

// ---- library bar ----
function renderLibs(){
  const bar=$('libs');
  const heart='<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7-4.6-9.3-8.5C1 9.4 2.6 6 6 6c2 0 3.2 1.2 4 2.3C10.8 7.2 12 6 14 6c3.4 0 5 3.4 3.3 6.5C19 16.4 12 21 12 21z"/></svg>';
  let html=`<div class="pill ${view==='all'?'on':''}" data-v="all">All Songs <span class="ct">${tracks.length}</span></div>`;
  html+=`<div class="pill ${view==='fav'?'on':''}" data-v="fav">${heart} Favorites <span class="ct">${tracks.filter(t=>t.fav).length}</span></div>`;
  for(const p of playlists){
    html+=`<div class="pill ${view===p.id?'on':''}" data-v="${p.id}">${p.name} <span class="ct">${p.trackIds.length}</span></div>`;
  }
  html+=`<div class="pill new" data-new="1">+ New</div>`;
  bar.innerHTML=html;
  bar.querySelectorAll('.pill').forEach(el=>{
    el.onclick=()=>{
      if(el.dataset.new){ newPlaylistSheet(); return; }
      view=el.dataset.v; render();
    };
  });
}

// ---- track list ----
function render(){
  renderLibs();
  const list=$('list');
  const vis=visible();
  if(!vis.length){
    let msg,sub;
    if(view==='all'){msg='Your library is empty';sub='Tap + to add audio files you own.';}
    else if(view==='fav'){msg='No favorites yet';sub='Open a track\u2019s menu and tap Favorite.';}
    else{msg='Empty playlist';sub='Add songs from the track menu (\u22ef).';}
    list.innerHTML=`<div class="empty">
      <svg width="54" height="54" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      <div><b>${msg}</b><br>${sub}</div></div>`;
    return;
  }
  const curId=current>=0&&queue[current]?queue[current].id:null;
  list.innerHTML='';
  vis.forEach((t,i)=>{
    const row=document.createElement('div');
    row.className='track'+(t.id===curId?' playing':'');
    const heart=t.fav?'<span class="heart">\u2665</span>':'';
    row.innerHTML=`<div class="idx">${i+1}</div>
      <div class="bars"><i></i><i></i><i></i></div>
      <div class="meta"><div class="t">${heart}<span style="overflow:hidden;text-overflow:ellipsis">${t.name}</span></div>
      <div class="s">${(t.size/1048576).toFixed(1)} MB</div></div>
      <div class="dots" data-dots="${t.id}">\u22ef</div>`;
    row.onclick=e=>{
      if(e.target.dataset.dots!==undefined){ trackSheet(t.id); return; }
      playFrom(i);
    };
    list.appendChild(row);
  });
}

// ---- playback (queue = snapshot of current view) ----
function playFrom(i){
  queue=visible();
  if(i<0||i>=queue.length)return;
  current=i;
  loadCurrent(true);
}
let url;
function loadCurrent(autoplay){
  const t=queue[current]; if(!t)return;
  if(url)URL.revokeObjectURL(url);
  url=URL.createObjectURL(t.blob);
  audio.src=url; if(autoplay)audio.play();
  updateNow(); render();
}
function updateNow(){
  const t=queue[current];
  $('nowT').textContent=t?t.name:'Nothing playing';
  $('nowS').textContent=t?(t.size/1048576).toFixed(1)+' MB':'Add audio to start';
  if('mediaSession' in navigator && t){
    navigator.mediaSession.metadata=new MediaMetadata({title:t.name,artist:'Reel'});
  }
}
function togglePlay(){
  if(current<0){ const v=visible(); if(v.length){view=view;queue=v;current=0;loadCurrent(true);} return; }
  if(audio.paused)audio.play();else audio.pause();
}
function nextTrack(auto){
  if(!queue.length)return;
  if(repeat&&auto){audio.currentTime=0;audio.play();return;}
  let n;
  if(shuffle)n=Math.floor(Math.random()*queue.length);
  else n=current+1>=queue.length?0:current+1;
  current=n; loadCurrent(true);
}
function prevTrack(){
  if(!queue.length)return;
  if(audio.currentTime>3){audio.currentTime=0;return;}
  current=current-1<0?queue.length-1:current-1; loadCurrent(true);
}

// ---- sheets ----
function openSheet(html){ $('sheetBody').innerHTML=html; $('scrim').classList.add('show'); $('sheet').classList.add('show'); }
function closeSheet(){ $('scrim').classList.remove('show'); $('sheet').classList.remove('show'); }
$('scrim').onclick=closeSheet;

const ic={
  fav:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-4.6-9.3-8.5C1 9.4 2.6 6 6 6c2 0 3.2 1.2 4 2.3C10.8 7.2 12 6 14 6c3.4 0 5 3.4 3.3 6.5C19 16.4 12 21 12 21z"/></svg>',
  add:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>',
  rm:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14"/></svg>',
  trash:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>'
};

function trackSheet(id){
  const t=trackById(id); if(!t)return;
  let h=`<h3>${t.name}</h3>`;
  h+=`<div class="opt" data-act="fav">${ic.fav}<span>${t.fav?'Remove from Favorites':'Add to Favorites'}</span>${t.fav?'<span class="chk">\u2713</span>':''}</div>`;
  h+=`<div class="opt" data-act="addpl">${ic.add}<span>Add to playlist\u2026</span></div>`;
  if(view!=='all'&&view!=='fav'){
    h+=`<div class="opt" data-act="rmpl">${ic.rm}<span>Remove from this playlist</span></div>`;
  }
  h+=`<div class="opt danger" data-act="del">${ic.trash}<span>Delete from library</span></div>`;
  openSheet(h);
  $('sheetBody').querySelectorAll('.opt').forEach(o=>{
    o.onclick=()=>handleTrackAct(o.dataset.act,id);
  });
}
async function handleTrackAct(act,id){
  const t=trackById(id);
  if(act==='fav'){ t.fav=!t.fav; await put('tracks',t); closeSheet(); render(); }
  else if(act==='addpl'){ addToPlaylistSheet(id); }
  else if(act==='rmpl'){
    const pl=playlists.find(p=>p.id===view);
    pl.trackIds=pl.trackIds.filter(x=>x!==id); await put('playlists',pl);
    closeSheet(); render();
  }
  else if(act==='del'){ closeSheet(); await removeTrack(id); }
}

function addToPlaylistSheet(id){
  let h=`<h3>Add to playlist</h3>`;
  if(playlists.length){
    for(const p of playlists){
      const has=p.trackIds.includes(id);
      h+=`<div class="opt" data-pl="${p.id}"><span style="width:22px;text-align:center;color:var(--accent)">${has?'\u2713':''}</span><span>${p.name}</span><span class="ct" style="margin-left:auto;color:var(--muted);font-size:12px">${p.trackIds.length}</span></div>`;
    }
  }
  h+=`<div class="opt" data-newpl="1" style="color:var(--accent)">${ic.add}<span>New playlist\u2026</span></div>`;
  openSheet(h);
  $('sheetBody').querySelectorAll('.opt').forEach(o=>{
    o.onclick=async()=>{
      if(o.dataset.newpl){ newPlaylistSheet(id); return; }
      const pl=playlists.find(p=>p.id===o.dataset.pl);
      if(pl.trackIds.includes(id)) pl.trackIds=pl.trackIds.filter(x=>x!==id);
      else pl.trackIds.push(id);
      await put('playlists',pl); addToPlaylistSheet(id); // refresh ticks
      renderLibs();
    };
  });
}

function newPlaylistSheet(addId){
  const h=`<h3>New playlist</h3>
    <input class="field" id="plName" placeholder="Playlist name" autocomplete="off">
    <div class="row2"><button class="btn ghost" id="plCancel">Cancel</button><button class="btn fill" id="plCreate">Create</button></div>`;
  openSheet(h);
  const inp=$('plName'); setTimeout(()=>inp.focus(),120);
  $('plCancel').onclick=closeSheet;
  const create=async()=>{
    const name=inp.value.trim(); if(!name)return;
    const pl={id:uid(),name,trackIds:addId?[addId]:[]};
    playlists.push(pl); await put('playlists',pl);
    view=pl.id; closeSheet(); render();
  };
  $('plCreate').onclick=create;
  inp.onkeydown=e=>{if(e.key==='Enter')create();};
}

async function removeTrack(id){
  const wasCur=queue[current]&&queue[current].id===id;
  await del('tracks',id);
  tracks=tracks.filter(t=>t.id!==id);
  // strip from playlists
  for(const p of playlists){
    if(p.trackIds.includes(id)){ p.trackIds=p.trackIds.filter(x=>x!==id); await put('playlists',p); }
  }
  if(wasCur){ audio.pause(); current=-1; queue=[]; updateNow(); }
  render();
}

// events
$('addBtn').onclick=()=>$('file').click();
$('file').onchange=e=>{addFiles(e.target.files);e.target.value='';};
$('play').onclick=togglePlay;
$('next').onclick=()=>nextTrack(false);
$('prev').onclick=prevTrack;
$('shuffle').onclick=()=>{shuffle=!shuffle;$('shuffle').classList.toggle('on',shuffle);};
$('repeat').onclick=()=>{repeat=!repeat;$('repeat').classList.toggle('on',repeat);};

audio.onplay=()=>{$('playIcon').innerHTML='<path d="M6 5h4v14H6zm8 0h4v14h-4z"/>';$('disc').classList.add('spin');if('mediaSession' in navigator)navigator.mediaSession.playbackState='playing';};
audio.onpause=()=>{$('playIcon').innerHTML='<path d="M8 5v14l11-7z"/>';$('disc').classList.remove('spin');if('mediaSession' in navigator)navigator.mediaSession.playbackState='paused';};
audio.onended=()=>nextTrack(true);
audio.ontimeupdate=()=>{
  $('cur').textContent=fmt(audio.currentTime);
  if(audio.duration)$('seek').value=(audio.currentTime/audio.duration)*1000;
};
audio.onloadedmetadata=()=>{$('dur').textContent=fmt(audio.duration);};
$('seek').oninput=e=>{if(audio.duration)audio.currentTime=(e.target.value/1000)*audio.duration;};

if('mediaSession' in navigator){
  navigator.mediaSession.setActionHandler('play',togglePlay);
  navigator.mediaSession.setActionHandler('pause',togglePlay);
  navigator.mediaSession.setActionHandler('nexttrack',()=>nextTrack(false));
  navigator.mediaSession.setActionHandler('previoustrack',prevTrack);
}

// boot
(async()=>{
  try{ db=await openDB(); tracks=await all('tracks'); playlists=await all('playlists'); }
  catch(e){ /* preview sandbox: storage off */ }
  render(); updateNow();
})();
</script>
</body>
</html>
